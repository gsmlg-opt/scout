name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string
      git_ref:
        description: "Git ref to release from"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ELIXIR_VERSION: "1.18.4-otp-28"
  OTP_VERSION: "28"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MIX_ENV: prod

jobs:
  release:
    name: Build Application Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache Mix dependencies and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.hex
            ~/.mix
          key: ${{ runner.os }}-mix-prod-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-prod-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Mix versions
        run: |
          VERSION="${{ inputs.version }}"
          perl -0pi -e 's/version: "[^"]+"/version: "'"$VERSION"'"/g' mix.exs apps/*/mix.exs

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Build assets
        run: mix do --app scout_web assets.deploy

      - name: Build release
        run: mix release --overwrite

      - name: Package release artifact
        run: |
          mkdir -p release-artifacts
          tar -czf "release-artifacts/scout-${{ inputs.version }}.tar.gz" -C _build/prod/rel scout

      - name: Commit version bump
        run: |
          git add mix.exs apps/*/mix.exs
          git commit -m "chore(release): v${{ inputs.version }}"

      - name: Create git tag
        run: git tag "v${{ inputs.version }}"

      - name: Push commit and tag
        run: git push origin HEAD:${{ inputs.git_ref }} && git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            release-artifacts/scout-${{ inputs.version }}.tar.gz \
            --generate-notes \
            --title "v${{ inputs.version }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-${{ inputs.version }}
          path: release-artifacts/scout-${{ inputs.version }}.tar.gz
          if-no-files-found: error
