name: Docker Build

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
        type: string
      docker_image_tag:
        description: "Docker image tag to publish"
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/gsmlg-dev/scout-server
  AGENT_IMAGE: ghcr.io/gsmlg-dev/scout-agent
  BUILD_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.git_ref }}
  IMAGE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.docker_image_tag }}

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: scout-server
            image: ghcr.io/gsmlg-dev/scout-server
            dockerfile: Dockerfile.server
          - name: scout-agent
            image: ghcr.io/gsmlg-dev/scout-agent
            dockerfile: Dockerfile.agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
